<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nusa Neurotech - Patient Monitor</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.5s; }
        .video-container { position: relative; width: 100%; padding-top: 75%; /* 4:3 Aspect Ratio */ background: #000; overflow: hidden; border-radius: 8px; }
        .video-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .status-indicator { width: 15px; height: 15px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .status-on { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .status-off { background-color: #555; }
        .log-box { height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.9em; background: #000; padding: 10px; border: 1px solid #333; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .log-time { color: #888; margin-right: 10px; }
        
        /* SOS Animation */
        @keyframes sos-flash {
            0% { background-color: #ff0000; }
            50% { background-color: #590000; }
            100% { background-color: #ff0000; }
        }
        .sos-active {
            animation: sos-flash 0.5s infinite;
        }
        .sos-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.5); z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .sos-overlay h1 { font-size: 5em; color: white; text-shadow: 2px 2px 0 #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="sosOverlay" class="sos-overlay">
    <h1>🚨 SOS !!!</h1>
    <button class="btn btn-warning btn-lg mt-4" onclick="stopSOS()">TUTUP PERINGATAN</button>
</div>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="fas fa-heartbeat me-2"></i>Nusa Neurotech Monitor</span>
        <span class="badge bg-primary">Live Connection</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <!-- Kolom Kiri: Video Feed -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header"><i class="fas fa-video me-2"></i>Live Camera Feed</div>
                <div class="card-body p-0">
                    <div class="video-container">
                        <!-- Image Source ini akan mengarah ke alamat IP Laptop Pasien nanti -->
                        <!-- Placeholder image sebelum connect -->
                        <img id="videoStream" src="" alt="Menunggu Koneksi Kamera..." class="video-feed" onerror="this.src='https://via.placeholder.com/800x600/000000/FFFFFF/?text=Camera+Offline'">
                    </div>
                </div>
            </div>
        </div>

        <!-- Kolom Kanan: Status & Kontrol -->
        <div class="col-md-4">
            
            <!-- PENGATURAN (SETTINGS) - FITUR BARU -->
            <div class="card bg-dark border-secondary mb-3">
                <div class="card-header bg-secondary text-white"><i class="fas fa-cog me-2"></i>Pengaturan Sistem</div>
                <div class="card-body">
                    <label for="blinkDurationRange" class="form-label small">Durasi Kedip Aksi (ms)</label>
                    <div class="d-flex align-items-center">
                        <input type="range" class="form-range flex-grow-1 me-2" min="500" max="5000" step="100" id="blinkDurationRange" value="2000" onchange="updateConfig()">
                        <span id="blinkDurationValue" class="badge bg-primary">2000</span>
                    </div>
                    <small class="text-muted">Geser untuk mengubah sensitivitas waktu.</small>
                </div>
            </div>

            <!-- Status Sistem -->
            <div class="card">
                <div class="card-header"><i class="fas fa-info-circle me-2"></i>Status Lampu</div>
                <div class="card-body text-center">
                    <div class="mb-3">
                        <i id="mainLightIcon" class="fas fa-lightbulb fa-4x text-muted"></i>
                    </div>
                    <h3 id="lightText" class="fw-bold text-muted">MATI</h3>
                    
                    <hr>
                    
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span><i class="fas fa-user me-2"></i>Pasien:</span>
                        <span id="patientName" class="badge bg-secondary">Unknown</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-server me-2"></i>MQTT Link:</span>
                        <span id="mqttStatus" class="text-danger">Disconnected</span>
                    </div>
                </div>
            </div>

            <!-- Manual Control (Override) -->
            <div class="card">
                <div class="card-header"><i class="fas fa-hand-pointer me-2"></i>Kendali Manual</div>
                <div class="card-body">
                    <button id="toggleLightBtn" class="btn btn-outline-warning w-100 py-3" onclick="manualToggleLight()">
                        <i class="fas fa-power-off me-2"></i> SAKLAR LAMPU
                    </button>
                </div>
            </div>

            <!-- Activity Log -->
            <div class="card">
                <div class="card-header"><i class="fas fa-history me-2"></i>Log Aktivitas</div>
                <div class="card-body p-0">
                    <div id="activityLog" class="log-box">
                        <!-- Log entries will appear here -->
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>

<!-- Scripts -->
<!-- Paho MQTT JS Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

<script>
    // --- KONFIGURASI ---
    const CAMERA_IP = window.location.hostname; 
    const CAMERA_PORT = "5000";
    document.getElementById('videoStream').src = `http://${CAMERA_IP}:${CAMERA_PORT}/video_feed`;

    // MQTT Configuration
    const MQTT_BROKER = "broker.hivemq.com";
    const MQTT_PORT = 8000; 
    const MQTT_TOPIC_LIGHT = "iot/commands/eyeblink"; // Sesuaikan dengan Python
    const MQTT_TOPIC_CONFIG = "nusaneuro/config/update";
    const MQTT_TOPIC_ALERT = "nusaneuro/alert";
    
    // --- LOGIC ---
    const client = new Paho.MQTT.Client(MQTT_BROKER, MQTT_PORT, "monitor_web_" + new Date().getTime());

    client.onConnectionLost = function (responseObject) {
        document.getElementById("mqttStatus").innerText = "Disconnected";
        document.getElementById("mqttStatus").className = "text-danger";
    };

    client.onMessageArrived = function (message) {
        const topic = message.destinationName;
        const payload = message.payloadString;
        
        if (topic === MQTT_TOPIC_LIGHT) {
            if (payload === "TOGGLE") {
                toggleVisuals(); // Fallback for old toggle command
            } else if (payload === "ON") {
                setVisuals(true);
            } else if (payload === "OFF") {
                setVisuals(false);
            }
            addLog(`Status Lampu: ${payload}`);
        } else if (topic === MQTT_TOPIC_ALERT) {
            triggerSOS();
        }
    };

    // Fungsi Connect
    function connectMQTT() {
        document.getElementById("mqttStatus").innerText = "Connecting...";
        client.connect({
            onSuccess: function () {
                document.getElementById("mqttStatus").innerText = "Connected";
                document.getElementById("mqttStatus").className = "text-success";
                client.subscribe(MQTT_TOPIC_LIGHT);
                client.subscribe(MQTT_TOPIC_ALERT);
                addLog("MQTT Siap. Monitoring aktif.");
            },
            onFailure: function (e) {
                document.getElementById("mqttStatus").innerText = "Failed";
                console.log(e);
            }
        });
    }

    // --- FITUR CONFIG ---
    function updateConfig() {
        const val = document.getElementById("blinkDurationRange").value;
        document.getElementById("blinkDurationValue").innerText = val;
        
        if (client.isConnected()) {
            const configPayload = JSON.stringify({ "action_duration": val });
            const message = new Paho.MQTT.Message(configPayload);
            message.destinationName = MQTT_TOPIC_CONFIG;
            client.send(message);
            addLog(`Setting Update: Durasi -> ${val}ms`);
        }
    }

    // --- FITUR VISUAL ---
    let isLightOn = false;
    
    function setVisuals(state) {
        isLightOn = state;
        updateUI();
    }
    
    function toggleVisuals() {
        isLightOn = !isLightOn;
        updateUI();
    }
    
    function updateUI() {
        const icon = document.getElementById("mainLightIcon");
        const text = document.getElementById("lightText");
        const btn = document.getElementById("toggleLightBtn");
        
        if (isLightOn) {
            // Status Box
            icon.className = "fas fa-lightbulb fa-4x text-warning"; 
            icon.style.textShadow = "0 0 20px yellow";
            text.innerText = "MENYALA";
            text.className = "fw-bold text-warning";
            
            // Button Update
            btn.className = "btn btn-warning w-100 py-3";
            btn.innerHTML = '<i class="fas fa-power-off me-2"></i> MATIKAN LAMPU';
        } else {
            // Status Box
            icon.className = "fas fa-lightbulb fa-4x text-muted";
            icon.style.textShadow = "none";
            text.innerText = "MATI";
            text.className = "fw-bold text-muted";
            
            // Button Update
            btn.className = "btn btn-outline-warning w-100 py-3";
            btn.innerHTML = '<i class="fas fa-power-off me-2"></i> NYALAKAN LAMPU';
        }
    }

    // --- FITUR SOS ---
    function triggerSOS() {
        document.body.classList.add("sos-active");
        document.getElementById("sosOverlay").style.display = "flex";
        addLog("🚨 SOS BAHAYA DITERIMA!");
    }

    function stopSOS() {
        document.body.classList.remove("sos-active");
        document.getElementById("sosOverlay").style.display = "none";
    }

    // --- FITUR OVERRIDE ---
    function manualToggleLight() {
        if (client && client.isConnected()) {
            // Send TOGGLE command (server will handle logic and return ON/OFF)
            const message = new Paho.MQTT.Message("TOGGLE");
            message.destinationName = MQTT_TOPIC_LIGHT;
            client.send(message);
            addLog("Manual: Tombol ditekan");
        } else {
            alert("MQTT belum terhubung.");
        }
    }

    function addLog(msg) {
        const logBox = document.getElementById("activityLog");
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML = `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>` + logBox.innerHTML;
    }
    
    connectMQTT();

</script>
</body>
</html>
